<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloaded files</title>
</head>
<body>
    <h1>Downloaded files</h1>

    <h2>Статистика по кажому файлу</h2>
    <table border="1">
        <tr>
            <th>Файл</th>
        </tr>
        {% for file in stats.files %}
        <tr>
            <td>{{ file.file_name }}</td>
        </tr>
        {% endfor %}
    </table>

    
</body>
</html>
